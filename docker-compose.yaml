services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts

  training:
    build: .
    shm_size: "8g"
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
    depends_on:
      - mlflow
